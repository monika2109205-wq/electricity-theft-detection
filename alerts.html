<!DOCTYPE html>
<html>
<head>
    <title>Alerts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h2>⚡ Energy App</h2>
    <a href="index.html">Dashboard</a>
    <a href="usage.html">Usage</a>
    <a href="alerts.html">Alerts</a>
</div>

<div class="main">
    <h1>⚠️ Suspicious Users</h1>

    <table>
        <tr>
            <th>User</th>
            <th>Status</th>
            <th>Usage</th>
        </tr>
        <tr>
            <td>House 12</td>
            <td class="red">High Risk</td>
            <td>5 units</td>
        </tr>
        <tr>
            <td>House 25</td>
            <td class="orange">Medium Risk</td>
            <td>50 units</td>
        </tr>
    </table>

</div>
<script>
async function loadAlerts() {
    let res = await fetch("/alerts");
    let data = await res.json();

    let table = document.querySelector("table");

    // Reset table
    table.innerHTML = `
        <tr>
            <th>User</th>
            <th>Status</th>
            <th>Usage</th>
        </tr>
    `;

    data.forEach(item => {
        let row = table.insertRow();

        row.insertCell(0).innerText = item.user;

        // 🔴 Status with dot
        row.insertCell(1).innerHTML =
            item.status === "High Risk"
            ? "🔴 High Risk"
            : "🟠 Medium Risk";

        // ✅ Correct usage column
        row.insertCell(2).innerText = item.usage + " units";
    });
}

window.onload = loadAlerts;
</script>

</body>
</html>
